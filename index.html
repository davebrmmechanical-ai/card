    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,0,0,0.85) 0%, rgba(20,5,5,0.78) 50%, rgba(0,0,0,0.90) 100%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(18,18,18,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .card-header {
      padding: 32px 28px 26px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .rm-logo {
      width: 130px;
      display: block;
      margin: 0 auto 20px;
      opacity: 0.90;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 14px;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .title {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
    }

    .card-body {
      padding: 20px 28px 28px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      border-radius: 8px;
      margin: 0 -8px;
    }

    .info-row:last-of-type { border-bottom: none; }
    a.info-row:hover { background: rgba(255,255,255,0.04); }

    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-icon svg { width: 18px; height: 18px; fill: #aaa; }

    .info-text { display: flex; flex-direction: column; }

    .info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 15px;
      color: #ddd;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,20,20,0.5), transparent);
      margin: 4px 0 8px;
    }

    .save-btn {
      display: block;
      width: 100%;
      background: rgba(160,20,20,0.85);
      color: #fff;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 20px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: background 0.15s;
      border: 1px solid rgba(200,40,40,0.3);
    }

    .save-btn:hover { background: rgba(180,25,25,0.95); }

    .save-btn svg {
      width: 15px; height: 15px; fill: #fff;
      vertical-align: -3px; margin-right: 7px;
    }
  </style>
</head>
