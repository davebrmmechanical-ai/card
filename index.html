<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dave Barnes — RM Mechanical</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .card-header {
      background: #1a3a5c;
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
    }

    .card-header::after {
      content: '';
      display: block;
      width: 48px;
      height: 3px;
      background: #e8702a;
      margin: 14px auto 0;
      border-radius: 2px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 16px;
      border: 3px solid #e8702a;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .title {
      font-size: 13px;
      color: #8fadc8;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .company {
      font-size: 15px;
      color: #c8d8e8;
      margin-top: 6px;
      font-weight: 500;
    }

    .card-body {
      padding: 28px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      border-radius: 6px;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
    }

    .info-row:last-of-type { border-bottom: none; }

    a.info-row:hover { background: #f5f8fc; }

    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #eef3f9;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-icon svg { width: 18px; height: 18px; fill: #1a3a5c; }

    .info-text {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 15px;
      color: #1a1a1a;
      font-weight: 500;
    }

    .save-btn {
      display: block;
      width: 100%;
      background: #e8702a;
      color: #fff;
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 24px;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #cf5f20; }

    .save-btn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      vertical-align: -3px;
      margin-right: 6px;
    }
  </style>
</head>
